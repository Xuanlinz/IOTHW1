<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hsuan Lin Chu — Personal</title>
  <meta name="description" content="Personal website of Hsuan Lin Chu.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Geometric background rays -->
  <div class="bg-rays" aria-hidden="true">
    <div class="ray ray-1"></div>
    <div class="ray ray-2"></div>
    <div class="ray ray-3"></div>
    <div class="ray ray-4"></div>
    <div class="ray ray-5"></div>
    <div class="ray ray-6"></div>
  </div>

  <!-- Glassmorphic Header -->
  <header id="site-header">
    <div class="header-inner">
      <a href="#" class="logo" id="logo">HLC</a>
      <nav id="main-nav">
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Projects</a>
        <a href="#" class="nav-link">Contact</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="toggle-icon" id="toggle-icon">☀️</span>
      </button>
    </div>
  </header>

  <!-- Hero Section -->
  <main id="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="hero-title">
        <span class="line">Hsuan</span>
        <span class="line">Lin Chu</span>
      </h1>
      <p class="hero-subtitle" id="hero-subtitle">Welcome to my corner of the internet</p>
    </div>

    <!-- Clock section -->
    <div class="clock-section" id="clock-section">
      <div class="clock-label">Current Time</div>
      <div class="clock-time" id="clock-time">--:--:--</div>
      <div class="clock-date" id="clock-date">--- --, ----</div>
    </div>
  </main>

  <!-- Footer -->
  <footer id="site-footer">
    <p>&copy; 2026 Hsuan Lin Chu</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
